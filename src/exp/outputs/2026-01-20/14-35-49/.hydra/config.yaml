provider: openrouter
openrouter:
  base_url: https://openrouter.ai/api/v1
  model: openai/gpt-4o
experiment:
  data_input_path: outputs/study1_cue_generation_requests.jsonl
  output_full_path: outputs/exp1_approach2_phase1_openrouter_gpt4o_outputs.jsonl
  concurrency: 10
  max_retries: 5
  top_logprobs: 20
  rate_limit_sleep: 0.1
  inference_mode: sampling
