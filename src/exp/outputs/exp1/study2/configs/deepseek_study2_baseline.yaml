# configs/deepseek_study2_baseline.yaml
# Usage: python unified_inference_hydra.py --configs-name deepseek_study2_baseline

provider: openrouter

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  model: "deepseek/deepseek-chat"

experiment:
  data_input_path: "requests/deepseek_study2_baseline.jsonl"
  output_full_path: "outputs/deepseek_study2_baseline_results.jsonl"
  concurrency: 10
  max_retries: 5
  top_logprobs: 20
  rate_limit_sleep: 0.1
  inference_mode: "auto"
  sampling_n: 200
  sampling_temperature: 1.0
  sampling_max_tokens: 2
