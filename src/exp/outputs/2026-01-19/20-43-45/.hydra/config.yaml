provider: openrouter
openrouter:
  base_url: https://openrouter.ai/api/v1
  model: openai/gpt-4o
experiment:
  data_input_path: outputs/exp1/openrouter_gpt4o/requests/exp1_openrouter_gpt4o_baseline_requests.jsonl
