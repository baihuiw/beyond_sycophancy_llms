provider: local_transformers

local_transformers:
  model_path: meta-llama/Meta-Llama-3-8B-Instruct
  device: mps
  torch_dtype: float16
  quantization: none

  extract_hidden_states: true
  hidden_state_layers: [-1, -5, -10, -15, -20, -25, -30]

experiment:
