provider: openai_compat

openai_compat:
  base_url: "https://openrouter.ai/api/v1"
  model: "llama-3.1-8b-instruct"

generation:
  temperature: 0.7
  top_p: 1.0
  max_tokens: 256

experiment:
  inference_mode: logprobs
  top_logprobs: 100
  data_input_path: "data/batches/study1_requests_full_reps10.jsonl"
  output_full_path: "outputs/study1_results_openrouter_llama31_8b_reps10.jsonl"
  rate_limit: 0.0

